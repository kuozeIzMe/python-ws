<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Myanmar OT Calculator - Premium Edition</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Padauk', 'sans-serif'],
                        num: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        dark: {
                            950: '#020617', // Deep Space
                            900: '#0f172a',
                            800: '#1e293b',
                        },
                        primary: {
                            400: '#38bdf8', // Sky
                            500: '#0ea5e9',
                            600: '#0284c7',
                        }
                    },
                    animation: {
                        'float': 'float 8s ease-in-out infinite',
                        'float-delayed': 'float 8s ease-in-out infinite 4s',
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        slideUp: {
                            'from': { opacity: 0, transform: 'translateY(20px)' },
                            'to': { opacity: 1, transform: 'translateY(0)' },
                        },
                        fadeIn: {
                            'from': { opacity: 0 },
                            'to': { opacity: 1 },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        /* Remove Spinners from Number Inputs */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* Premium Glass Effect */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.4) 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.6) 0%, rgba(15, 23, 42, 0.6) 100%);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6), 
                        0 0 20px rgba(56, 189, 248, 0.1);
        }
        
        .glass-card:hover::before {
            opacity: 1;
        }

        /* Input Styling */
        .input-field {
            transition: all 0.3s ease;
        }
        .input-field:focus {
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.3), 0 0 15px rgba(56, 189, 248, 0.2);
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(56, 189, 248, 0.5);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .pb-safe { padding-bottom: calc(6rem + env(safe-area-inset-bottom)); }
        
        /* Neon text utility */
        .text-neon-blue {
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
    </style>
</head>
<body class="antialiased selection:bg-cyan-500/30 selection:text-cyan-200">

    <!-- PRELOADER -->
    <div id="preloader" class="fixed inset-0 z-[100] bg-[#020617] flex flex-col items-center justify-center transition-all duration-1000 ease-out overflow-hidden">
        <div class="absolute inset-0 opacity-20" 
             style="background-image: radial-gradient(#38bdf8 1px, transparent 1px); background-size: 40px 40px; transform: perspective(500px) rotateX(20deg);">
        </div>

        <div class="relative flex flex-col items-center">
            <div class="relative w-40 h-40 flex items-center justify-center mb-10">
                <div class="absolute inset-0 rounded-full border-2 border-transparent border-t-cyan-500 border-l-cyan-500/30 animate-[spin_2s_linear_infinite] shadow-[0_0_30px_rgba(6,182,212,0.2)]"></div>
                <div class="absolute inset-3 rounded-full border-2 border-transparent border-b-violet-500 border-r-violet-500/30 animate-[spin_3s_linear_infinite_reverse]"></div>
                <div class="relative z-10 w-20 h-20 bg-gradient-to-br from-cyan-950 to-slate-900 rounded-full flex items-center justify-center border border-white/10 shadow-[0_0_50px_rgba(6,182,212,0.4)] animate-pulse">
                    <div class="absolute inset-0 bg-cyan-500/20 rounded-full blur-xl animate-pulse"></div>
                    <i data-lucide="clock" class="text-white w-8 h-8 relative z-10 drop-shadow-[0_0_10px_rgba(255,255,255,0.8)]"></i>
                </div>
            </div>
            
            <div class="w-64 space-y-4">
                <div class="text-center">
                    <h2 class="text-3xl font-bold tracking-[0.2em] text-white font-num mb-1">OT<span class="text-cyan-400">CALC</span></h2>
                    <p class="text-[10px] text-cyan-500/70 font-num tracking-[0.4em] uppercase">System Initializing</p>
                </div>
                
                <div class="h-1 w-full bg-slate-800/50 rounded-full overflow-hidden border border-white/5 relative">
                    <div id="progress-bar" class="h-full bg-gradient-to-r from-cyan-500 via-blue-500 to-violet-500 w-0 shadow-[0_0_20px_rgba(6,182,212,0.8)] relative">
                        <div class="absolute right-0 top-0 bottom-0 w-2 bg-white/50 blur-[2px]"></div>
                    </div>
                </div>
                
                <div class="flex justify-between text-[10px] font-num text-slate-400 font-medium tracking-wider">
                    <span class="animate-pulse">LOADING LAW DATA...</span>
                    <span id="progress-text" class="text-cyan-400 font-bold">0%</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Ambient Background -->
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-blue-600/10 rounded-full blur-[120px] animate-float"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-emerald-600/10 rounded-full blur-[120px] animate-float-delayed"></div>
        <div class="absolute top-[30%] left-[40%] w-[40%] h-[40%] bg-violet-600/5 rounded-full blur-[100px] animate-pulse-slow"></div>
        <div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 30px 30px;"></div>
    </div>

    <div class="min-h-screen flex flex-col md:flex-row relative z-10">
        
        <!-- SIDEBAR (Desktop) -->
        <aside class="hidden md:flex w-72 glass-panel border-r border-white/5 flex-col m-4 rounded-3xl h-[calc(100vh-2rem)] sticky top-4 shadow-2xl z-20 transition-all">
            <div class="p-8 pb-6">
                <div class="flex items-center gap-3 mb-1">
                    <div class="w-12 h-12 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(6,182,212,0.4)] border border-white/10 relative overflow-hidden group">
                        <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-500"></div>
                        <i data-lucide="clock" class="text-white w-6 h-6 relative z-10"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-white tracking-tight font-num">OT<span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">Calc</span></h1>
                        <p class="text-[10px] text-slate-400 font-medium tracking-[0.2em] uppercase">Myanmar</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 px-4 space-y-2 mt-4" id="desktop-nav">
                <!-- Nav items injected by JS -->
            </nav>

            <div class="p-6 mt-auto">
                <div class="glass-card p-4 rounded-2xl border border-emerald-500/20 bg-emerald-500/5 relative overflow-hidden group cursor-default">
                    <div class="absolute inset-0 bg-emerald-500/10 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    <div class="flex items-center gap-3 relative z-10">
                        <div class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_10px_rgba(52,211,153,0.8)] animate-pulse"></div>
                        <div>
                            <h4 class="text-xs font-bold text-emerald-300">Labour Law Ready</h4>
                            <p class="text-[10px] text-emerald-400/60 font-num">Version 2.0</p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- MOBILE HEADER -->
        <div class="md:hidden fixed top-0 left-0 right-0 z-40 bg-[#020617]/80 backdrop-blur-xl border-b border-white/5 px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-cyan-500/20">
                    <i data-lucide="clock" class="text-white w-5 h-5"></i>
                </div>
                <span class="font-bold text-lg text-white font-num">OT<span class="text-cyan-400">Calc</span></span>
            </div>
            <div class="w-9 h-9 rounded-full bg-slate-800/80 border border-white/10 flex items-center justify-center text-slate-400 relative backdrop-blur-md">
                <i data-lucide="info" class="w-4 h-4"></i>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <main class="flex-1 relative z-10 pt-24 md:pt-4 md:px-0 pb-28 md:pb-4 h-screen overflow-y-auto custom-scrollbar scroll-smooth">
            <div id="app-content" class="max-w-4xl mx-auto px-4 md:px-8 space-y-8 animate-slide-up pb-10">
                <!-- Dynamic Content injected here -->
            </div>
        </main>

        <!-- MOBILE BOTTOM NAV -->
        <div class="md:hidden fixed bottom-6 left-4 right-4 h-[70px] glass-panel rounded-2xl border border-white/10 z-50 flex items-center justify-between px-2 shadow-[0_10px_30px_rgba(0,0,0,0.5)]" id="mobile-nav">
            <!-- Mobile nav items injected by JS -->
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // --- State Management ---
        const state = {
            activeTab: 'monthly', // 'monthly' or 'daily'
            result: null
        };

        const formatMoney = (num) => {
            return num.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
        };

        // --- Render Functions ---

        function renderNavigation() {
            const tabs = [
                { id: 'monthly', label: 'လစဉ်လစာ', labelDesk: 'လစဉ်လစာစား (Monthly)', icon: 'calendar' },
                { id: 'daily', label: 'နေ့စား', labelDesk: 'နေ့စားအလုပ်သမား (Daily)', icon: 'sun' },
            ];

            // Desktop Nav
            const desktopNav = document.getElementById('desktop-nav');
            desktopNav.innerHTML = tabs.map(tab => `
                <button onclick="switchTab('${tab.id}')" 
                    class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all duration-300 group relative overflow-hidden ${state.activeTab === tab.id ? 'text-white bg-white/5 border border-white/5 shadow-lg' : 'text-slate-400 hover:text-white hover:bg-white/5'}">
                    ${state.activeTab === tab.id ? '<div class="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-cyan-400 to-blue-500 rounded-l-full"></div>' : ''}
                    <i data-lucide="${tab.icon}" class="w-5 h-5 relative z-10 transition-transform duration-300 ${state.activeTab === tab.id ? 'text-cyan-400 scale-110' : 'group-hover:scale-110'}"></i>
                    <span class="font-medium relative z-10 tracking-wide">${tab.labelDesk}</span>
                    ${state.activeTab === tab.id ? '<div class="absolute right-4 w-1.5 h-1.5 rounded-full bg-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.8)]"></div>' : ''}
                </button>
            `).join('');

            // Mobile Nav
            const mobileNav = document.getElementById('mobile-nav');
            mobileNav.innerHTML = tabs.map(tab => {
                const isActive = state.activeTab === tab.id;
                return `
                    <button onclick="switchTab('${tab.id}')" class="flex-1 flex flex-col items-center justify-center h-full relative group">
                        <div class="absolute -top-1 w-8 h-1 bg-gradient-to-r from-transparent via-cyan-400 to-transparent rounded-full opacity-0 transition-opacity ${isActive ? 'opacity-100' : ''}"></div>
                        <div class="p-2 rounded-xl transition-all duration-300 ${isActive ? 'text-cyan-400 bg-cyan-500/10' : 'text-slate-500 group-hover:text-slate-300'}">
                            <i data-lucide="${tab.icon}" class="w-6 h-6 ${isActive ? 'fill-cyan-500/20' : ''}"></i>
                        </div>
                        <span class="text-[10px] font-medium mt-1 ${isActive ? 'text-cyan-400' : 'text-slate-500'}">${tab.label}</span>
                    </button>
                `;
            }).join('');
        }

        function renderMainContent() {
            const isMonthly = state.activeTab === 'monthly';
            const title = isMonthly ? 'လစဉ်လစာစား ဝန်ထမ်းများအတွက်' : 'နေ့စား အလုပ်သမားများအတွက်';
            const desc = isMonthly ? 'Monthly Salary Workers' : 'Daily Wages Workers';
            const color = isMonthly ? 'cyan' : 'orange';
            const icon = isMonthly ? 'briefcase' : 'hammer';
            
            // Generate result HTML if available
            let resultHTML = '';
            if (state.result && state.result.type === state.activeTab) {
                resultHTML = `
                <div class="animate-slide-up mt-8 space-y-6">
                    <!-- Main Result Card -->
                    <div class="glass-card p-6 rounded-3xl relative overflow-hidden group border border-${color}-500/20">
                        <div class="absolute -right-6 -top-6 p-10 rounded-full bg-${color}-500/10 opacity-20 blur-2xl transition-all duration-700 group-hover:opacity-30 group-hover:scale-125"></div>
                        <div class="relative z-10 text-center py-4">
                            <h4 class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">တစ်နာရီ အချိန်ပိုလုပ်ခ (Hourly OT Rate)</h4>
                            <h3 class="text-4xl md:text-5xl font-bold text-white font-num tracking-tight mb-2 text-neon-blue drop-shadow-[0_0_15px_rgba(6,182,212,0.3)]">
                                ${formatMoney(state.result.finalRate)} <span class="text-lg text-slate-500">Ks</span>
                            </h3>
                        </div>
                    </div>

                    <!-- Steps Breakdown -->
                    <div>
                        <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider pl-1 mb-4 flex items-center gap-2">
                            <i data-lucide="list-checks" class="w-4 h-4"></i> တွက်ချက်ပုံ အဆင့်ဆင့်
                        </h3>
                        <div class="space-y-3">
                            ${state.result.steps.map((step, index) => `
                                <div class="glass-card p-4 rounded-2xl flex items-center gap-4 hover:bg-white/5 transition-colors" style="animation: slideUp 0.5s ease-out ${index * 0.1}s backwards">
                                    <div class="w-10 h-10 rounded-xl bg-slate-800 border border-white/5 flex items-center justify-center font-bold font-num text-${color}-400 shadow-lg">
                                        ${index + 1}
                                    </div>
                                    <div class="flex-1">
                                        <p class="text-xs text-slate-400 font-bold uppercase mb-0.5">${step.label}</p>
                                        <p class="text-white font-num font-medium">${step.value}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                `;
            }

            return `
                <div class="flex flex-col gap-1 mb-8">
                    <h2 class="text-3xl font-bold text-white tracking-tight font-num bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent flex items-center gap-3">
                        <div class="p-2 rounded-lg bg-${color}-500/20 border border-${color}-500/20"><i data-lucide="${icon}" class="w-6 h-6 text-${color}-400"></i></div>
                        ${title}
                    </h2>
                    <p class="text-slate-400 text-sm">${desc}</p>
                </div>

                <!-- Input Card -->
                <div class="glass-card rounded-3xl p-6 md:p-8 border border-white/10 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-64 h-64 bg-${color}-500/10 rounded-full blur-[80px] pointer-events-none -mr-20 -mt-20"></div>
                    
                    <form onsubmit="handleCalculate(event)" class="relative z-10 space-y-6">
                        <div class="flex flex-col gap-2.5 group">
                            <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider pl-1 group-hover:text-${color}-400 transition-colors">
                                ${isMonthly ? 'လစဉ် အခြေခံလစာ (Basic Salary)' : 'တစ်ရက် လုပ်ခ (Daily Wage)'}
                            </label>
                            <div class="relative transition-all duration-200">
                                <input id="amount-input" type="number" placeholder="${isMonthly ? '300000' : '10000'}" required
                                    class="input-field w-full bg-slate-900/40 border border-white/10 rounded-xl px-5 py-4 text-lg text-white placeholder-slate-600 focus:outline-none transition-all font-num"
                                />
                                <div class="absolute right-5 top-4 text-slate-500 font-bold pointer-events-none">Ks</div>
                            </div>
                        </div>

                        <button type="submit" class="w-full bg-gradient-to-r from-${color}-600 to-${isMonthly ? 'blue' : 'red'}-600 hover:from-${color}-500 hover:to-${isMonthly ? 'blue' : 'red'}-500 text-white shadow-[0_0_20px_rgba(6,182,212,0.4)] border border-white/10 px-8 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all active:scale-95 group text-lg">
                            <i data-lucide="calculator" class="w-5 h-5 group-hover:scale-110 transition-transform"></i> တွက်ချက်မည်
                        </button>
                    </form>
                </div>

                ${resultHTML}

                <div class="mt-8 p-4 rounded-2xl bg-slate-900/50 border border-white/5 flex items-start gap-3">
                    <i data-lucide="info" class="w-5 h-5 text-slate-500 mt-0.5"></i>
                    <p class="text-xs text-slate-500 leading-relaxed">
                        <strong>မှတ်ချက် -</strong> အလုပ်သမားဥပဒေအရ အချိန်ပိုလုပ်ခ (OT) ကို တစ်ရက်လျှင် အများဆုံး ၄ နာရီခန့်သာ လုပ်ခွင့်ရှိပါသည်။ (စနေနေ့တဝက်နှင့် တနင်္ဂနွေပိတ်ရက်များမပါ)
                    </p>
                </div>
            `;
        }

        // --- Logic ---

        function switchTab(mode) {
            state.activeTab = mode;
            state.result = null; // Reset result on tab switch
            renderApp();
        }

        function handleCalculate(e) {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('amount-input').value);
            
            if (!amount || amount <= 0) return;

            // Adding loading effect
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> တွက်နေပါသည်...';
            
            setTimeout(() => {
                if (state.activeTab === 'monthly') {
                    // Formula: 2 x [ (Salary x 12) / (52 x 44) ]
                    const yearlySalary = amount * 12;
                    const yearlyHours = 52 * 44; // 2288
                    const hourlyRate = yearlySalary / yearlyHours;
                    const finalOTRate = hourlyRate * 2;

                    state.result = {
                        type: 'monthly',
                        finalRate: finalOTRate,
                        steps: [
                            { label: 'အဆင့် ၁ (တစ်နှစ်စာလစာ)', value: `${formatMoney(amount)} × 12 = ${formatMoney(yearlySalary)} ကျပ်` },
                            { label: 'အဆင့် ၂ (တစ်နှစ် အလုပ်ချိန်)', value: `52 × 44 = ${formatMoney(yearlyHours)} နာရီ` },
                            { label: 'အဆင့် ၂ (ပုံမှန်တစ်နာရီနှုန်း)', value: `${formatMoney(yearlySalary)} ÷ ${yearlyHours} = ${formatMoney(hourlyRate)} ကျပ်` },
                            { label: 'အဆင့် ၄ (OT ၂ ဆနှုန်း)', value: `${formatMoney(hourlyRate)} × 2` }
                        ]
                    };
                } else {
                    // Formula: 2 x [ (Wage x 6) / 44 ]
                    const weeklyIncome = amount * 6;
                    const weeklyHours = 44;
                    const hourlyRate = weeklyIncome / weeklyHours;
                    const finalOTRate = hourlyRate * 2;

                    state.result = {
                        type: 'daily',
                        finalRate: finalOTRate,
                        steps: [
                            { label: 'အဆင့် ၁ (တစ်ပတ်စာဝင်ငွေ)', value: `${formatMoney(amount)} × 6 = ${formatMoney(weeklyIncome)} ကျပ်` },
                            { label: 'အဆင့် ၂ (ပုံမှန်တစ်နာရီနှုန်း)', value: `${formatMoney(weeklyIncome)} ÷ 44 = ${formatMoney(hourlyRate)} ကျပ်` },
                            { label: 'အဆင့် ၃ (OT ၂ ဆနှုန်း)', value: `${formatMoney(hourlyRate)} × 2` }
                        ]
                    };
                }
                
                renderApp();
                // Scroll to result
                setTimeout(() => {
                    const content = document.getElementById('app-content');
                    content.scrollIntoView({ behavior: 'smooth', block: 'end' });
                }, 100);
            }, 600); // Fake calculation delay for UX
        }

        function renderApp() {
            renderNavigation();
            document.getElementById('app-content').innerHTML = renderMainContent();
            lucide.createIcons();
            
            // Re-focus input if no result
            if(!state.result) {
                const input = document.getElementById('amount-input');
                if(input) input.focus();
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
            
            // Preloader logic
            const progress = document.getElementById('progress-bar');
            const text = document.getElementById('progress-text');
            const preloader = document.getElementById('preloader');
            let width = 0;

            const interval = setInterval(() => {
                width += Math.random() * 5; 
                if (width > 100) width = 100;
                
                if (progress) progress.style.width = width + '%';
                if (text) text.innerText = Math.floor(width) + '%';

                if (width >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        if(preloader) {
                            preloader.classList.add('opacity-0', 'scale-105', 'pointer-events-none');
                            setTimeout(() => preloader.remove(), 700);
                        }
                    }, 500); 
                }
            }, 40); 
        });

    </script>
</body>
</html>
